<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Coordinator/Volunteer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2><i class="fas fa-user-plus"></i> Apply for Coordinator/Volunteer</h2>
            <p>Fill in the details to apply for a coordinator or volunteer role for an event.</p>
        </div>
        <form id="applyRoleForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter email address">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label for="role">Apply As</label>
                <select id="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="coordinator">Coordinator</option>
                    <option value="volunteer">Volunteer</option>
                </select>
            </div>
            <div class="form-group" id="eventDropdownGroup" style="display:none;">
                <label for="eventId">Select Event</label>
                <select id="eventId" name="eventId" required></select>
            </div>
            <div id="conditionalFields"></div>
            <button type="submit" class="btn">
                <i class="fas fa-paper-plane"></i> Submit Application
            </button>
        </form>
        <p id="errorMsg" class="error-message"></p>
        <p id="successMsg" class="success-message"></p>
    </div>
    <script src="js/config.js"></script>
    <script src="js/apply-role.js"></script>
</body>
</html>
